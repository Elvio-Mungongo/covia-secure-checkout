<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sessão — COVIA</title>
  <meta name="description" content="Entre na sua conta COVIA para aceder a ofertas exclusivas em massage guns." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f7f3ec;
      color: #141414;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }
    .wrap { width: 100%; max-width: 420px; }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand a {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #141414;
      text-decoration: none;
    }
    .brand .dot { color: #b8a07e; }
    .card {
      background: #ffffff;
      border: 1px solid #e3dccf;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 10px 40px -20px rgba(0,0,0,0.15);
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-bottom: 28px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #2a2a2a;
    }
    input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      font-size: 15px;
      border: 1px solid #d8d2c4;
      border-radius: 10px;
      background: #fafaf7;
      color: #141414;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    input:focus {
      border-color: #141414;
      background: #ffffff;
    }
    .btn {
      width: 100%;
      height: 48px;
      background: #141414;
      color: #f7f3ec;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.15s;
    }
    .btn:hover { background: #2a2a2a; transform: translateY(-1px); }
    .footer-link {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 22px;
    }
    .footer-link a {
      color: #141414;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px solid #b8a07e;
    }
    .footer-link a:hover { color: #b8a07e; }
    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      text-decoration: none;
    }
    .forgot:hover { color: #141414; }
    .back {
      display: inline-block;
      margin-top: 20px;
      text-align: center;
      width: 100%;
      font-size: 13px;
      color: #666;
      text-decoration: none;
    }
    .back:hover { color: #141414; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <a href="/">COVIA<span class="dot">.</span></a>
    </div>
    <div class="card">
      <h1>Iniciar sessão</h1>
      <p class="subtitle">Entre na sua conta COVIA</p>
       <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
          <a href="#" class="forgot">Esqueceu a senha?</a>
        </div>
        <button type="submit" class="btn">Entrar</button>
       </form>
 
       <script>
         document.getElementById('loginForm').addEventListener('submit', function(e) {
           e.preventDefault();
           const email = document.getElementById('email').value;
           const password = document.getElementById('password').value;
           
           if (email === 'comotastu65@gmail.com' && password === 'cassiangulo2026') {
             localStorage.setItem('covia_admin_logged_in', 'true');
             window.location.href = '/admin/dashboard.html';
           } else {
             alert('Credenciais incorretas. Por favor, tente novamente.');
           }
         });
       </script>
      <p class="footer-link">
        Ainda não tem conta? <a href="/register.html">Criar conta</a>
      </p>
    </div>
    <a href="/" class="back">← Voltar à loja</a>
  </div>
</body>
</html>
